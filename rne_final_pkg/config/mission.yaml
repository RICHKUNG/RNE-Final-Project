grab_distance_threshold: 0.5
observe_wait_seconds: 5.5
nav_arrive_threshold: 0.5
search_rotation_timeout: 30.0

plan_follow_min_dist: 0.5
plan_forward_angle_deg: 20.0

visual_servo_deadband_px: 60.0
visual_servo_rotate_threshold_px: 80.0

bridge_deadband_px: 100.0
bridge_min_area_ratio: 0.03
bridge_cross_seconds: 6.0

# Vision safety layer — bridge avoidance during _state_approach
# (does NOT apply to T2_BRIDGE_ALIGN / T2_CROSS which cross deliberately)
bridge_safety_area_threshold: 0.05
bridge_avoid_backward_seconds: 0.5
bridge_avoid_turn_seconds: 0.8

clear_backward_seconds: 2.0
clear_rotate_seconds: 1.0
clear_forward_seconds: 1.0

# Grab verification (T*_VERIFY states)
verify_backup_seconds: 0.4
verify_observe_seconds: 0.8
