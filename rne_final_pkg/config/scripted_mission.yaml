# Config for scripted_final_mission (no Nav2 — localization-assisted scripted route).
# Coordinates are map-frame placeholders: calibrate against the stored map before a real run.

init:
  # Max seconds to wait in INIT for localization pose + required YOLO topics.
  # On timeout the mission FAILS loudly instead of starting blind.
  wait_timeout_s: 15.0
  # Pose older than this (seconds) counts as lost → mission stops and complains.
  pose_stale_s: 2.0
  # Hands-off start: if AMCL has no pose after initial_pose_wait_s, publish
  # /initialpose with the values below (map frame), repeating until localized.
  # Spawn assumed at map origin (build_map starts SLAM there); yaw matches
  # route.start_heading_yaw. Verify against the stored map before a real run.
  initial_pose_wait_s: 3.0
  initial_pose_x: 0.0
  initial_pose_y: 0.0
  initial_pose_yaw: 0.0486   # rad

route:
  # Route to the door (measured 2026-06-12, map frame):
  #   spawn → straight → turn_point → left 90° → straight → door_lane_point
  #         → right 90° → short straight → door_front → knob visual servo
  start_heading_yaw: 0.0486   # rad — heading at spawn (reference for calibration)

  turn_point:          # measured: end of the first straight leg from spawn
    x: 3.0378860404780157
    y: 0.025078211891774258
    yaw: 0.0486        # rad — heading on arrival; left-turn target = yaw + pi/2
    tolerance: 0.20
  door_lane_point:     # PROVISIONAL calibration value, not measured:
    x: 3.0378860404780157   #   x = turn_point.x
    y: 1.6131596549874418   #   y = door_front.y
    tolerance: 0.20         # replace with the measured second-turn pose when available
  door_front:          # measured: standing point facing the door knob
    x: 3.058493898788231
    y: 1.6131596549874418
    yaw: 0.0341        # rad — final heading facing the knob (right-turn target)
    tolerance: 0.15
  door_exit_point:     # measured 2026-06-12: hold point just past the opened door
    x: 3.5640017942719395
    y: 1.5840655836032285
    yaw: 0.0326        # rad — from measured quaternion (z=0.016320, w=0.999867)
    tolerance: 0.05    # tight: the push ends near this point, so a loose
                       # tolerance skips the positioning drive entirely
  # Ramp observe chains (measured 2026-06-12 from /amcl_pose, map frame). Each is
  # an ordered list walked top→bottom: drive to a point, RAMP_SCAN; if the ramp
  # isn't seen there, advance to the next point. Exhausting the long chain moves
  # to the short chain; exhausting both fails. yaw is radians (from the measured
  # quaternion; yaw_deg kept in the comment for reference).
  long_side_observe:   # car faces ≈ -x, scanning the ramp from the long side
    - x: 3.1
      y: 2.3993529864074534
      yaw: -3.14    # yaw_deg -173.50
      tolerance: 0.25
    - x: 3.1
      y: 1.5115117995190306
      yaw: -3.14     # yaw_deg -178.91
      tolerance: 0.25
    - x: 3.1
      y: 0.9010239171932514
      yaw: -3.14     # yaw_deg -178.75
      tolerance: 0.25
  short_side_observe:  # car faces ≈ +y, scanning the ramp from the short side
    - x: 1.8089964857296893
      y: -0.04615138122065065
      yaw: 1.57      # yaw_deg 89.21
      tolerance: 0.25
    - x: 1.54922645232404
      y: -0.17849396546502885
      yaw: 1.57     # yaw_deg 96.66
      tolerance: 0.25
    - x: 0.89347816558855
      y: -0.11186797965906972
      yaw: 1.57      # yaw_deg 98.17
      tolerance: 0.25
  long_to_short_corner:  # Perimeter corner between the long and short observe chains.
    # Going straight from the long chain's last point to the short chain's first
    # point cuts a diagonal across the inner corner — straight over the bridge.
    # Instead route through this OUTER corner: drive down the right edge (x of the
    # long side) to the bottom edge (y of the short side), then the short-side
    # move turns to face +y. Two right-angle legs, no diagonal.
    x: 3.0    # ≈ long_side right edge x (matches long_side_observe last point)
    y: -0.046 # ≈ short_side bottom edge y (matches short_side_observe first point)
    tolerance: 0.25
  origin:              # TODO calibrate: drop-off / return point
    x: 0.0
    y: 0.0
    tolerance: 0.25

control:
  fast_speed: 700.0
  medium_speed: 450.0      # used for route legs
  slow_speed: 400.0        # used for visual servo / final approach
  turn_speed: 300.0
  turn_slow_speed: 300.0   # near-target rotation; 150 stalls in-place turns in Unity, 250 works
  turn_slowdown_deg: 20.0  # yaw error below this → rotate at turn_slow_speed (anti-overshoot)
  yaw_tolerance_deg: 3.0   # turn-in-place completion threshold, in DEGREES (plain number — YAML can't eval math.radians())
  forward_angle_deg: 20.0  # heading error below this → drive forward, else rotate
  xy_tolerance: 0.20       # default arrival tolerance when a waypoint omits one

stuck:
  # Active while commanding forward on route legs (drive_to_point).
  move_threshold_m: 0.03   # less displacement than this counts as not moving
  timeout_s: 2.0           # no movement for this long → back up and retry
  recover_backward_s: 1.0

safety:
  # Map +x beyond this is the sea (drive there and the car falls in). No route
  # waypoint exceeds it — reaching it means drift/overshoot, so the sea guard
  # catches it. Door states (DOOR_PRESS_COMMIT, TURN_FORWARD, BACK_UP_AFTER_TASK3)
  # are exempt: the door and door_exit_point (~x=3.56) legitimately sit past it.
  sea_x_limit: 3.4
  # Escape pulls x below (limit − this) before handing control back, so the car
  # doesn't immediately re-trigger sitting on the boundary.
  sea_clear_margin: 0.15

debug:
  # Set to a state name (e.g. TASK3_KNOB_SERVO) to jump there right after INIT,
  # skipping earlier states — for calibrating one phase at a time.
  # Empty = normal mission flow. Invalid names abort at startup.
  start_state: ""

knob_servo:
  target_depth_m: 0.50
  # Commit window is [target - tol, target]: farther → forward, closer than
  # (target - tol) → back up. The pre-press forward leg is computed dynamically
  # (commit depth − press_standoff_m), so committing anywhere in the window still
  # presses correctly — a wide window is fine. The window MUST be wider than the
  # per-tick travel (~0.02 m at slow_speed, 10 Hz) or bang-bang control overshoots
  # it every correction and oscillates forever (the old 0.03 m window did this).
  # 0.12 → window [0.38, 0.50]; lower bound stays safely above the 0.30 m standoff.
  depth_tolerance_m: 0.12
  # On reaching the window: stop, wait this long, re-read depth, commit only if
  # still in window. Kills message-lag/coast error (occasional press overshoot);
  # the settled depth also sizes the pre-press forward leg (see press_standoff_m).
  commit_settle_s: 0.5
  center_threshold_px: 40.0
  max_seconds: 20.0          # total servo budget; exceeded → FAILED (fail loud)
  invalid_depth_fail_s: 2.0  # knob centered but depth invalid for this long → FAILED

door_press:
  # The hit pose is calibrated for a 0.30 m car-to-knob gap. The pre-press
  # forward leg is computed per run as (servo commit depth − press_standoff_m),
  # so servo-window variance no longer shifts the press distance.
  press_standoff_m: 0.30
  forward_before_press_m: 0.20   # fallback only: debug-jumping straight into
                                 # DOOR_PRESS has no servo commit depth
  forward_during_press_m: 0.12
  # Straight-line displacement of the arc push. Door opening angle ≈
  # 2*asin(d / (2*door_width)). Measured 2026-06-12 in Unity: actual door_width ≈ 0.56 m
  # (not 0.78 m). Calibration: 0.97 m total → 120°; 0.76 m total → ~85° (target).
  # forward_during_press_m (0.12) + push_after_unlock_m (0.64) = 0.76 m total.
  push_after_unlock_m: 0.64
  push_speed: 120.0          # straight segments: pre-press forward, retry backup
  # Arc push toward front-right while the claw holds the knob down. Hinge is
  # on the RIGHT (facing the door), handle on the LEFT, so the handle sweeps
  # front-right as the door swings open — the arc follows it. If the car turns
  # too sharply and slides off the door, raise push_speed_right toward
  # push_speed_left. TODO TUNE the ratio in Unity.
  # 150/90 stalled against the door's resistance (moved only 0.18 m of 1.12 m in
  # 13 s); scaled up ~2x keeping the 1.67 arc ratio so the car pushes through.
  push_speed_left: 450.0
  push_speed_right: 270.0
  # Arc push duration. While the claw holds the door the base barely translates
  # (door resists + wheels skid), so pose distance never reaches push_after_unlock_m
  # and phase 5 used to always run to phase_timeout_s (13 s) — pushing the door far
  # past 90°. Phase 5 now ends at this TIME instead, so the door angle = push_speed ×
  # push_seconds. TUNE: too far past 90° → lower push_seconds (or push_speed_*);
  # not open enough → raise it. push_after_unlock_m below is now just a sanity
  # early-out, not the primary terminator.
  push_seconds: 3.0
  retry_count: 0             # extra unconditional re-presses; door opens first try
  exit_wait_s: 1.0           # hold at route.door_exit_point after the door opens
  # Calibrated 2026-06-12 from /robot_arm echo (3 joints; arm_writer leaves the
  # rest, same as STOW_POS). Raw radians: raise [0.0, 2.4609142, 1.5707963],
  # press [0.9948377, 2.4609142, 1.5707963] = exactly the degrees below.
  arm_raise_deg:  [0.0, 141.0, 90.0]    # gripper at highest point, above the knob
  arm_press_deg:  [57.0, 141.0, 90.0]   # hit pose — just touches the knob at 0.30 m
  # TODO TUNE: low pose the press continues to AFTER the hit pose, driving the
  # knob fully down. Placeholder — joint0 deepened past 57°, not yet calibrated.
  arm_press_low_deg: [80.0, 141.0, 90.0]
  # Pose held DURING the arc push. The door has a top/bottom rod lock — the
  # handle must stay pressed while the door moves or it re-locks at a small
  # angle. Hold the FULL low (pressed-to-bottom) pose through the push rather
  # than lifting back to the hit pose — keeping the claw low keeps the lock
  # fully disengaged so the door swings wider. Same value as arm_press_low_deg.
  arm_push_hold_deg: [80.0, 141.0, 90.0]
  arm_settle_s: 1.2          # wait after each arm command
  phase_timeout_s: 13.0      # per-phase watchdog: pose-distance phases give up
                             # after this (sized for the ~1.12 m arc push; raise
                             # alongside push_after_unlock_m or it truncates early)

post_task3:
  # After the door opens, turn back to face forward (TASK3_TURN_FORWARD), then
  # reverse straight back this far (pose-measured) before scanning for the ramp —
  # clears the doorway so the ramp comes into the camera's view for the
  # observe/scan chain.
  turn_forward_timeout_s: 5.0  # give up the face-forward turn after this (still
                               # jammed on the door) and reverse anyway
  backup_distance_m: 0.7
  backup_speed: 400.0        # slow_speed; in-place reverse, no heading control

ramp:
  # Reference only — the model is loaded by yolo_example_pkg/object_detect.py from its
  # installed share dir (SEG_MODEL_FILENAME). Listed here so calibration notes stay together.
  model_path: "/home/howard/richkung/RNE/ros2_yolo_integration/src/yolo_example_pkg/models/ramp_yolo11n.pt"
  # Ramp scan uses the larger of:
  #   - bottom-area ratio (legacy /yolo/bridge_info[2])
  #   - full-frame mask ratio (/yolo/bridge_info[3])
  # This catches short-side observations where Foxglove shows the ramp mask
  # higher in the frame but the legacy bottom-half score is still near zero.
  found_area_threshold: 0.01
  info_stale_s: 1.5
  # Units = distinct seg inferences (~1 Hz; seg runs every SEG_CHECK_INTERVAL
  # camera frames), NOT 10 Hz control ticks.
  found_required_frames: 2
  found_window_frames: 6
  # Outbound pre-check (SEGMENT_1, spawn→turn_point): the ramp is seen from far
  # away here so it fills much less of the frame than the close-range observe
  # scan — use looser thresholds (smaller area, fewer hits) just to set the
  # "bridge is horizontal" flag. Tune against the去程 log if it under/over-fires.
  outbound_area_threshold: 0.01
  outbound_required_frames: 2
  scan_seconds: 3.0         # max time scanning per observation side
  center_threshold_px: 50.0
  # RAMP_ALIGN_BOTTOM (runs once after a scan confirms the ramp, before the
  # approach): visual-servo the ramp mask's near edge down to the frame bottom.
  # /yolo/bridge_info[4] reports that edge as y/(h-1): 0=top, 1=frame bottom.
  align_bottom_target_ratio: 0.95   # edge ≥ this counts as aligned to the bottom
  align_speed: 120.0                 # forward creep speed while closing the gap
  align_timeout_s: 15.0              # ramp not reacquired this long → go to approach anyway
  approach_speed: 120.0
  approach_done_area: 0.15   # ramp fills this much of bottom half → close enough, classify bears
  approach_timeout_s: 30.0

bear:
  # Classification: blocking bear = low in frame AND close.
  blocking_pixel_y_threshold: 360.0
  blocking_depth_threshold_m: 1.0
  # Reserved: /yolo/bear_info has no area field yet (TODO if classification needs it).
  blocking_area_threshold: 0.05
  classify_observe_seconds: 1.5
  align_threshold_px: 50.0
  # Lowers the published /clicked_point target below the bear marker so the
  # gripper descends from above (top-down grab). Applied on this (mission) side;
  # arm_controller_2D's own offset is 0.0. Larger = gripper aims lower; 0.0 =
  # aim straight at the marker. Tune on flat ground with get_bear first.
  grab_z_offset_m: 0.0
  # Auto-grab starts only when the bear is freshly visible, centered within
  # align_threshold_px, and strictly closer than this depth.
  grab_distance_m: 0.4
  # Once inside grab_distance_m, keep pushing forward briefly instead of
  # stopping on the ramp face. This prevents the car from holding a standoff,
  # sliding backward, then re-servoing forever.
  grab_commit_forward_seconds: 0.8
  grab_commit_forward_speed: 220.0
  # 0 = stop fully before/while the arm grabs. Was 120 (a forward creep to fight
  # gravity pulling the chassis back on the ramp), but the IK target is sampled
  # ONCE at trigger from the YOLO marker, then the car kept creeping for the full
  # grab_wait_seconds (~12s) — so the bear's real position drifted away from the
  # locked target and the arm reached for a stale/too-far X (the 0.18m > 0.191m
  # max-reach miss). Stopping removes that motion-vs-stale-depth inconsistency.
  # CAVEAT: if the car now back-slides on the ramp during the grab, restore a
  # small value (e.g. 60) rather than the old 120.
  grab_hold_forward_speed: 0.0
  grab_info_stale_s: 0.7
  # Safe arm precondition before publishing target_point/clicked_point to auto_arm.
  # Direct /robot_arm degrees, calibrated from /robot_arm echo:
  # [0.0, 141.0, 90.0] = raised claw pose that avoids sweeping through the bear.
  safe_pre_arm_pose_deg: [0.0, 141.0, 90.0]
  pre_arm_settle_s: 0.5
  # Seconds to wait after triggering the auto_arm_human IK grab (/clicked_point)
  # before depth-probe verification. The grab runs in arm_controller_2D's background
  # thread (open → IK approach → close → retract); too short drops the bear before
  # the gripper closes. Matches get_bear_node's grab_wait_seconds. TUNE to the rig.
  grab_wait_seconds: 12.0
  servo_timeout_s: 600.0      # bear lost during servo for this long → FAILED
  # Auto-retry only after the depth-probe check proves the bear did not move with
  # the claw. This avoids dropping a successfully-held bear while preventing a
  # ground bear from being accepted as success.
  verify_retry_on_ground: true
  grab_retry_max: 2          # used only when verify_retry_on_ground=true
  # Grasp verification: record bear depth, back up a little, then require fresh
  # /yolo/bear_info depth to stay nearly unchanged. A held bear moves with the
  # car/camera; a ground bear's depth changes by roughly the probe distance.
  verify_baseline_observe_seconds: 0.3
  verify_probe_distance_m: 0.12
  verify_probe_min_distance_m: 0.06
  verify_probe_speed: 220.0
  verify_probe_timeout_s: 0.7
  verify_restore_timeout_s: 0.7
  verify_observe_seconds: 0.8
  verify_info_stale_s: 0.7
  verify_arm_depth_threshold: 0.35
  verify_depth_min_frames: 1
  verify_depth_stable_tolerance_m: 0.05
  clear_backward_seconds: 1.0
  clear_rotate_seconds: 1.2

return:
  # Before driving home, leave the bridge/ramp in the safe direction:
  #   horizontal / long-side bridge (yaw near ±180°) → drive forward 1.0 m
  #   vertical / short-side bridge (yaw near +90°)   → reverse 1.5 m
  bridge_yaw_select_threshold_deg: 55.0
  bridge_exit_speed: 300.0
  horizontal_forward_m: 1.0
  vertical_reverse_m: 1.5
  drop_at_origin: true       # false = hold the bear at origin until task trigger
  drop_wait_seconds: 2.0
  back_away_seconds: 1.0
