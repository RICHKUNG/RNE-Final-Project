# Config for scripted_final_mission (no Nav2 — localization-assisted scripted route).
# Coordinates are map-frame placeholders: calibrate against the stored map before a real run.

init:
  # Max seconds to wait in INIT for localization pose + required YOLO topics.
  # On timeout the mission FAILS loudly instead of starting blind.
  wait_timeout_s: 15.0
  # Pose older than this (seconds) counts as lost → mission stops and complains.
  pose_stale_s: 2.0

route:
  # Route to the door (measured 2026-06-12, map frame):
  #   spawn → straight → turn_point → left 90° → straight → door_lane_point
  #         → right 90° → short straight → door_front → knob visual servo
  start_heading_yaw: 0.0486   # rad — heading at spawn (reference for calibration)

  turn_point:          # measured: end of the first straight leg from spawn
    x: 2.8378860404780157
    y: 0.025078211891774258
    yaw: 0.0486        # rad — heading on arrival; left-turn target = yaw + pi/2
    tolerance: 0.20
  door_lane_point:     # PROVISIONAL calibration value, not measured:
    x: 2.8378860404780157   #   x = turn_point.x
    y: 1.6131596549874418   #   y = door_front.y
    tolerance: 0.20         # replace with the measured second-turn pose when available
  door_front:          # measured: standing point facing the door knob
    x: 3.058493898788231
    y: 1.6131596549874418
    yaw: 0.0341        # rad — final heading facing the knob (right-turn target)
    tolerance: 0.15
  long_side_observe:   # TODO calibrate: long-side ramp observation pose
    x: 0.0
    y: 0.0
    yaw: 0.0           # rad, map frame — face map center
    tolerance: 0.25
  short_side_observe:  # TODO calibrate: short-side ramp observation pose
    x: 0.0
    y: 0.0
    yaw: 0.0
    tolerance: 0.25
  origin:              # TODO calibrate: drop-off / return point
    x: 0.0
    y: 0.0
    tolerance: 0.25

control:
  fast_speed: 500.0
  medium_speed: 300.0      # used for route legs
  slow_speed: 150.0        # used for visual servo / final approach
  turn_speed: 250.0
  turn_slowdown_deg: 20.0  # yaw error below this → rotate at slow_speed (anti-overshoot)
  yaw_tolerance_deg: 5.0   # turn-in-place completion threshold
  forward_angle_deg: 20.0  # heading error below this → drive forward, else rotate
  xy_tolerance: 0.20       # default arrival tolerance when a waypoint omits one

stuck:
  # Active while commanding forward on route legs (drive_to_point).
  move_threshold_m: 0.03   # less displacement than this counts as not moving
  timeout_s: 2.0           # no movement for this long → back up and retry
  recover_backward_s: 1.0

debug:
  # Set to a state name (e.g. TASK3_KNOB_SERVO) to jump there right after INIT,
  # skipping earlier states — for calibrating one phase at a time.
  # Empty = normal mission flow. Invalid names abort at startup.
  start_state: ""

knob_servo:
  target_depth_m: 0.30
  center_threshold_px: 40.0
  max_seconds: 20.0          # total servo budget; exceeded → FAILED (fail loud)
  invalid_depth_fail_s: 2.0  # knob centered but depth invalid for this long → FAILED

door_press:
  forward_before_press_m: 0.08
  forward_during_press_m: 0.12
  push_after_unlock_m: 0.35
  push_speed: 120.0
  retry_count: 1
  # Joint order matches arm_driver: base, shoulder, elbow, wrist, gripper (deg).
  # TODO TUNE: placeholder poses — calibrate against the Unity door knob height.
  arm_raise_deg:  [90.0, 10.0, 150.0, 180.0, 40.0]   # raised, clear of camera path
  arm_press_deg:  [90.0, 60.0, 120.0, 120.0, 40.0]   # pressing down on the knob
  arm_settle_s: 1.2          # wait after each arm command
  phase_timeout_s: 6.0       # per-phase watchdog: pose-distance phases give up after this

ramp:
  # Reference only — the model is loaded by yolo_example_pkg/object_detect.py from its
  # installed share dir (SEG_MODEL_FILENAME). Listed here so calibration notes stay together.
  model_path: "/home/howard/richkung/RNE/ros2_yolo_integration/src/yolo_example_pkg/models/ramp_yolo11s.pt"
  found_area_threshold: 0.03
  # Units = distinct seg inferences (~1 Hz; seg runs every SEG_CHECK_INTERVAL
  # camera frames), NOT 10 Hz control ticks.
  found_required_frames: 3
  found_window_frames: 6
  scan_seconds: 10.0         # max time scanning per observation side
  center_threshold_px: 50.0
  approach_speed: 120.0
  approach_done_area: 0.15   # ramp fills this much of bottom half → close enough, classify bears
  approach_timeout_s: 30.0

bear:
  # Classification: blocking bear = low in frame AND close.
  blocking_pixel_y_threshold: 360.0
  blocking_depth_threshold_m: 1.0
  # Reserved: /yolo/bear_info has no area field yet (TODO if classification needs it).
  blocking_area_threshold: 0.05
  classify_observe_seconds: 1.5
  align_threshold_px: 50.0
  grab_distance_m: 0.4
  servo_timeout_s: 20.0      # bear lost during servo for this long → FAILED
  grab_retry_max: 2
  verify_backup_seconds: 0.5
  verify_observe_seconds: 0.8
  clear_backward_seconds: 1.0
  clear_rotate_seconds: 1.2

return:
  drop_at_origin: true       # false = hold the bear at origin until task trigger
  drop_wait_seconds: 2.0
  back_away_seconds: 1.0
